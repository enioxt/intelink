#cloud-config
# EGOS Inteligência — Cloud Init Configuration
# Ubuntu 22.04 LTS

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - tmux
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common

# Usuário de deploy
users:
  - name: deploy
    groups: sudo, docker
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys: []
    lock_passwd: true

# Docker installation
runcmd:
  # Configurar unattended-upgrades
  - echo 'unattended-upgrades unattended-upgrades/enable_auto_updates boolean true' | debconf-set-selections
  - dpkg-reconfigure -f noninteractive unattended-upgrades

  # Instalar Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # Adicionar usuários ao grupo docker
  - usermod -aG docker ubuntu
  - usermod -aG docker deploy

  # Configurar UFW (Uncomplicated Firewall)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp comment 'SSH'
  - ufw allow 80/tcp comment 'HTTP'
  - ufw allow 443/tcp comment 'HTTPS'
  - ufw --force enable

  # Configurar Fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Configurar timezone
  - timedatectl set-timezone America/Sao_Paulo

  # Criar diretórios do projeto
  - mkdir -p /opt/egos-inteligencia
  - mkdir -p /opt/egos-inteligencia/data/neo4j
  - mkdir -p /opt/egos-inteligencia/data/redis
  - mkdir -p /opt/egos-inteligencia/data/caddy
  - mkdir -p /opt/egos-inteligencia/backups
  - chown -R deploy:deploy /opt/egos-inteligencia

  # Configurar logrotate para Docker
  - |
    cat > /etc/logrotate.d/docker-containers << 'EOF'
    /var/lib/docker/containers/*/*.log {
      rotate 7
      daily
      compress
      size=10M
      missingok
      delaycompress
      copytruncate
    }
    EOF

  # Script de health check
  - |
    cat > /usr/local/bin/egos-health.sh << 'EOF'
    #!/bin/bash
    # EGOS Health Check Script
    set -e

    API_URL="http://localhost:8000/health"
    FRONTEND_URL="http://localhost:3000"

    # Check API
    if curl -sf "$API_URL" > /dev/null 2>&1; then
      echo "✅ API: OK"
    else
      echo "❌ API: FAIL"
      exit 1
    fi

    # Check Frontend
    if curl -sf "$FRONTEND_URL" > /dev/null 2>&1; then
      echo "✅ Frontend: OK"
    else
      echo "❌ Frontend: FAIL"
      exit 1
    fi

    echo "🎉 All services healthy"
    EOF
    chmod +x /usr/local/bin/egos-health.sh

  # Script de backup
  - |
    cat > /usr/local/bin/egos-backup.sh << 'EOF'
    #!/bin/bash
    # EGOS Backup Script
    set -e

    BACKUP_DIR="/opt/egos-inteligencia/backups"
    DATE=$(date +%Y%m%d_%H%M%S)
    RETENTION_DAYS=7

    mkdir -p "$BACKUP_DIR"

    # Backup Neo4j
    docker exec egos-inteligencia-neo4j neo4j-admin database dump neo4j --to-path="/backups/neo4j_$DATE.dump" 2>/dev/null || true

    # Backup Redis (se persistido)
    docker exec egos-inteligencia-redis redis-cli BGSAVE 2>/dev/null || true

    # Limpar backups antigos
    find "$BACKUP_DIR" -name "*.dump" -mtime +$RETENTION_DAYS -delete
    find "$BACKUP_DIR" -name "*.rdb" -mtime +$RETENTION_DAYS -delete

    echo "✅ Backup completed: $DATE"
    EOF
    chmod +x /usr/local/bin/egos-backup.sh

  # Cron para backup diário
  - echo "0 2 * * * deploy /usr/local/bin/egos-backup.sh >> /var/log/egos-backup.log 2>&1" | crontab -u deploy -

  # Limpar pacotes desnecessários
  - apt-get autoremove -y
  - apt-get clean

final_message: |
  🎉 EGOS Inteligência server initialized!
  Environment: ${environment}
  
  Next steps:
  1. Clone repository: git clone https://github.com/enioxt/intelink.git /opt/egos-inteligencia
  2. Configure .env file
  3. Run: docker compose up -d
