name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check src/ tests/ || true
      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports || true
      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Integration tests (no DB)
        run: pytest tests/integration/ -v --tb=short -m "not requires_neo4j and not requires_redis"

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_INTELINK_API: http://localhost:8000/api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Unit tests
        run: npm run test --if-present || true
