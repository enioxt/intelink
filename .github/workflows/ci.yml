name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/ || true
      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports || true
      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Integration tests (no DB)
        env:
          APP_ENV: test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ci-test-password
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars-long
          JWT_ALGORITHM: HS256
          OPENROUTER_API_KEY: sk-ci-placeholder
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration/ -v --tb=short -m "not requires_neo4j and not requires_redis"


  backend-neo4j:
    name: Backend Integration (Neo4j)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: api
    services:
      neo4j:
        image: neo4j:5.20-community
        env:
          NEO4J_AUTH: neo4j/ci-test-password
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            wget -q --spider http://localhost:7474 && break
            echo "Waiting for Neo4j... ($i/30)"
            sleep 3
          done
      - name: Neo4j integration tests
        env:
          NEO4J_TEST_URI: bolt://localhost:7687
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ci-test-password
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars-long
          JWT_ALGORITHM: HS256
          APP_ENV: test
          OPENROUTER_API_KEY: sk-ci-placeholder
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration/ -v --tb=short -m "requires_neo4j"

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_INTELINK_API: http://localhost:8000/api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Unit tests
        run: npm run test --if-present || true
