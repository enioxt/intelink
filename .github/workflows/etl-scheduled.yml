name: ETL Scheduled Pipelines

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily — Group 0 sanctions

  workflow_dispatch:
    inputs:
      mode:
        description: "'group' (index 0-3) or 'pipeline' (name)"
        required: true
        default: "pipeline"
        type: choice
        options: [pipeline, group]
      target:
        description: "Pipeline name (e.g. leniency) OR group index (0-3)"
        required: true
        default: "leniency"
      limit:
        description: "Record limit (leave empty for full run)"
        required: false
        default: ""

# Neo4j only listens on 127.0.0.1:7687 (Docker internal on VPS).
# Cloud runners cannot reach it — we SSH into the VPS and run there.

jobs:
  sanctions-daily:
    name: Daily Sanctions Update (Group 0)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: SSH → VPS → run Group 0
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          ETL_DATA_DIR: ${{ secrets.ETL_DATA_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: NEO4J_URI,NEO4J_USER,NEO4J_PASSWORD,NEO4J_DATABASE,ETL_DATA_DIR
          command_timeout: 120m
          script: |
            set -e
            REPO_DIR="/opt/bracc/egos-inteligencia"

            if [ -d "$REPO_DIR" ]; then
              git -C "$REPO_DIR" pull --rebase
            else
              git clone git@github.com:enioxt/intelink.git "$REPO_DIR"
            fi

            cd "$REPO_DIR/api"
            python3 -m venv .venv 2>/dev/null || true
            source .venv/bin/activate
            pip install -q -e ".[dev]"

            python -m egos_inteligencia.etl.runner \
              run-group 0 \
              --data-dir "$ETL_DATA_DIR" \
              --workers 4

  manual-run:
    name: Manual (${{ github.event.inputs.mode }} → ${{ github.event.inputs.target }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: SSH → VPS → run ${{ github.event.inputs.mode }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          ETL_DATA_DIR: ${{ secrets.ETL_DATA_DIR }}
          RUN_MODE: ${{ github.event.inputs.mode }}
          RUN_TARGET: ${{ github.event.inputs.target }}
          RUN_LIMIT: ${{ github.event.inputs.limit }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: NEO4J_URI,NEO4J_USER,NEO4J_PASSWORD,NEO4J_DATABASE,ETL_DATA_DIR,RUN_MODE,RUN_TARGET,RUN_LIMIT
          command_timeout: 120m
          script: |
            set -e
            REPO_DIR="/opt/bracc/egos-inteligencia"

            if [ -d "$REPO_DIR" ]; then
              git -C "$REPO_DIR" pull --rebase
            else
              git clone git@github.com:enioxt/intelink.git "$REPO_DIR"
            fi

            cd "$REPO_DIR/api"
            python3 -m venv .venv 2>/dev/null || true
            source .venv/bin/activate
            pip install -q -e ".[dev]"

            LIMIT_FLAG=""
            [ -n "$RUN_LIMIT" ] && LIMIT_FLAG="--limit $RUN_LIMIT"

            if [ "$RUN_MODE" = "group" ]; then
              python -m egos_inteligencia.etl.runner \
                run-group "$RUN_TARGET" \
                --data-dir "$ETL_DATA_DIR" \
                --workers 4
            else
              python -m egos_inteligencia.etl.runner \
                run "$RUN_TARGET" \
                --data-dir "$ETL_DATA_DIR" \
                $LIMIT_FLAG
            fi
