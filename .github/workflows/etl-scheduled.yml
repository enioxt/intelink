name: ETL Scheduled Pipelines

on:
  # Sanctions: daily (critical for accuracy)
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily

  # Manual trigger for any pipeline
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline name (e.g. leniency, ofac, ceaf)"
        required: true
        default: "leniency"
      limit:
        description: "Record limit (leave empty for full run)"
        required: false
        default: ""

jobs:
  sanctions-daily:
    name: Daily Sanctions Update
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml
      - name: Install deps
        working-directory: api
        run: pip install -e ".[dev]"
      - name: Run sanctions pipelines
        working-directory: api
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE || 'neo4j' }}
          DATA_DIR: ${{ secrets.ETL_DATA_DIR || './data' }}
        run: |
          echo "Running Group 0: sanctions + compliance pipelines"
          python -m egos_inteligencia.etl.runner run-group 0 --data-dir "$DATA_DIR" --workers 4

  manual-run:
    name: Manual Pipeline Run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml
      - name: Install deps
        working-directory: api
        run: pip install -e ".[dev]"
      - name: Run pipeline
        working-directory: api
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE || 'neo4j' }}
          DATA_DIR: ${{ secrets.ETL_DATA_DIR || './data' }}
        run: |
          LIMIT_FLAG=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_FLAG="--limit ${{ github.event.inputs.limit }}"
          fi
          python -m egos_inteligencia.etl.runner run "${{ github.event.inputs.pipeline }}" \
            --data-dir "$DATA_DIR" $LIMIT_FLAG
